name: "Build and Deploy to Cloudflare Pages (Static Export)"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need previous commit to detect changed files

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build static site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=olive-wisdom --branch=main

      # ── Sitemap auto-ping (every deploy) ─────────────────────────────────────
      - name: Ping sitemaps to Google & Bing
        run: |
          BASE_URL="https://olive-wisdom.com"
          SITEMAP="${BASE_URL}/sitemap.xml"

          echo "📡 Pinging sitemaps..."
          BING=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.bing.com/ping?sitemap=${SITEMAP}")
          echo "  Bing sitemap ping: HTTP $BING"

          # Google ping endpoint (submit sitemap notification)
          GOOGLE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.google.com/ping?sitemap=${SITEMAP}")
          echo "  Google sitemap ping: HTTP $GOOGLE"

      # ── IndexNow: auto-ping Google/Bing/Yandex for new/changed articles ──
      - name: IndexNow ping for new/updated articles
        run: |
          INDEXNOW_KEY="6d2ae74844cd4130a2c21736a99a7dfc"
          BASE_URL="https://olive-wisdom.com"

          # Detect changed markdown files in content/posts/
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'content/posts/*.md' 2>/dev/null || echo "")

          # On workflow_dispatch or no changed posts — submit full URL list via IndexNow
          if [ -z "$CHANGED" ]; then
            echo "No changed posts — submitting all article URLs via IndexNow"
            # Collect all slugs from content/posts/
            URL_LIST=""
            for f in content/posts/*.md; do
              SLUG=$(basename "$f" .md)
              URL="${BASE_URL}/blog/${SLUG}/"
              URL_LIST="${URL_LIST}\"${URL}\","
            done
            URL_LIST="[${URL_LIST%,}]"
          else
            # Build URL list from changed .md files only
            URL_LIST=""
            for f in $CHANGED; do
              SLUG=$(basename "$f" .md)
              URL="${BASE_URL}/blog/${SLUG}/"
              URL_LIST="${URL_LIST}\"${URL}\","
              echo "  → Queuing: $URL"
            done
            URL_LIST="[${URL_LIST%,}]"
          fi

          # Ping IndexNow (covers Google, Bing, Yandex via api.indexnow.org)
          PAYLOAD=$(printf '{"host":"%s","key":"%s","keyLocation":"%s/%s.txt","urlList":%s}' \
            "olive-wisdom.com" "$INDEXNOW_KEY" "$BASE_URL" "$INDEXNOW_KEY" "$URL_LIST")

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "IndexNow response: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "✅ IndexNow ping successful — Google/Bing/Yandex notified"
          else
            echo "⚠️  IndexNow ping returned $HTTP_CODE (non-blocking)"
          fi
