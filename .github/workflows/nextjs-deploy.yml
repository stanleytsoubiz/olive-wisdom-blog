name: "Build and Deploy to Cloudflare Pages (OpenNext)"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build with OpenNext for Cloudflare Pages
        run: npm run build:cf

      - name: Restructure for Pages Advanced Mode
        run: |
          # Static assets (CSS/JS) must sit at the deployment root so URLs like
          # /_next/static/foo.css map to actual files. opennextjs puts them in
          # .open-next/assets/, while worker dependencies (cloudflare/,
          # middleware/, server-functions/, .build/) sit one level above.
          # We deploy .open-next/assets/ as the root and move the worker plus
          # its relative-import dependencies into it.
          mv .open-next/cloudflare .open-next/assets/
          mv .open-next/middleware .open-next/assets/
          mv .open-next/server-functions .open-next/assets/
          mv .open-next/.build .open-next/assets/
          mv .open-next/worker.js .open-next/assets/_worker.js
          ls -la .open-next/assets/ | head -25

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .open-next/assets --project-name=olive-wisdom --branch=main
