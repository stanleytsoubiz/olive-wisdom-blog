name: "Auto Deploy Blog"

on:
  push:
    paths:
      - 'content/posts/**.md'
  workflow_dispatch:
    inputs:
      message:
        description: 'Deploy message'
        required: false
        default: 'Manual deploy'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: "Install Wrangler"
        run: npm install -g wrangler

      - name: "Convert MDX to HTML"
        run: node scripts/build-blog.js

      - name: "Commit generated files"
        run: |
          git config user.name "Auto Deploy Bot"
          git config user.email "deploy@olive-wisdom.com"
          git add deploy/blog/ deploy/sitemap.xml 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Deploy: $(date +'%Y-%m-%d %H:%M UTC')"
          git push origin main || echo "Nothing to push"

      - name: "Deploy to Cloudflare Pages"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy deploy --project-name olive-wisdom --branch main --commit-dirty=true
          echo "Deployed to https://olive-wisdom.com/blog"
