        z-index:0;background:#1a1a12;overflow:hidden;
        pointer-events:none;

    <!-- Hero skeleton 移除（最輕量版，不影響 TBT）-->
    <script>
      (function() {
        function tryHide() {
          var sk = document.getElementById('hero-skeleton');
          if (!sk) return;
          var r = document.getElementById('root');
          if (r && r.children.length) {
            sk.style.cssText='opacity:0;transition:opacity .25s';
            setTimeout(function(){sk && sk.parentNode && sk.parentNode.removeChild(sk);}, 300);
          } else {
            /* 只監聽 #root 的直接子節點，代價極低 */
            if (r) {
              var obs = new MutationObserver(function(_,o){o.disconnect();tryHide();});
              obs.observe(r, {childList:true});
            } else {
              /* #root 還沒解析，等 DOMContentLoaded */
              document.addEventListener('DOMContentLoaded', function() {
                var root = document.getElementById('root');
                if (root) {
                  var obs2 = new MutationObserver(function(_,o){o.disconnect();tryHide();});
                  obs2.observe(root, {childList:true});
                }
              }, {once:true});
            }
          }
        }
        tryHide();
      })();
    </script>

    (function(){
      function updateTabBar(){
        var hash = window.location.hash || '#/';
        var tabs = document.querySelectorAll('#ow-tab-bar a');
        tabs.forEach(function(a){
          a.classList.remove('active');
          if(hash === '#/' || hash === '') {

          } else if(a.getAttribute('href') && hash.startsWith(a.getAttribute('href'))) {

  <!-- ♿ Accessibility: aria-label patch for unlabeled buttons -->
  <script>
    (function() {
      function patchAriaLabels() {
        // 修補 Header 中沒有 aria-label 的 button
        var headerBtns = document.querySelectorAll('header button:not([aria-label])');
        headerBtns.forEach(function(btn) {
          var svg = btn.querySelector('svg');
          var text = btn.textContent.trim();
          if (!text && svg) {
            // 根據 button class 或位置推測用途
            var cls = btn.className || '';
            if (cls.includes('search') || cls.includes('magnif')) {
              btn.setAttribute('aria-label', '搜尋');
            } else if (cls.includes('menu') || cls.includes('burger') || cls.includes('hamb')) {
              btn.setAttribute('aria-label', '展開選單');
            } else {
              btn.setAttribute('aria-label', '按鈕');
            }
          }
        });
        // 修補 Tab Bar 如果有 button
        var tabBtns = document.querySelectorAll('#ow-tab-bar button:not([aria-label])');
        tabBtns.forEach(function(btn, i) {
          var labels = ['首頁', '科學', '鑑賞', '歷史', '生活'];
          btn.setAttribute('aria-label', labels[i] || ('導航 ' + (i+1)));
        });
      }
      // 在 React mount 後執行
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() { setTimeout(patchAriaLabels, 1500); });
      } else {
        setTimeout(patchAriaLabels, 1500);
      }
      // 監聽 SPA 路由變化
      window.addEventListener('hashchange', function() { setTimeout(patchAriaLabels, 500); });
    })();
  </script>


  <!-- 📱 Mobile nav hide via JS (CSS specificity override) -->
  <script>
    (function() {
      var isMobile = window.innerWidth <= 768;
      if (!isMobile) return;

      function hideHeaderNav() {
        var header = document.querySelector('header');
        if (!header) return;
        // 找所有 nav 或包含多個 link 的 flex 容器
        var nav = header.querySelector('nav');
        if (nav) {
          nav.style.setProperty('display', 'none', 'important');
          nav.setAttribute('aria-hidden', 'true');
        }
        // 也隱藏 header 內直接包含 a[href] 的 div/flex 容器（非 logo）
        var divs = header.querySelectorAll('div');
        divs.forEach(function(div) {
          var links = div.querySelectorAll('a');
          // 如果 div 裡有 3 個以上 link 且不是 logo，就隱藏
          if (links.length >= 3) {
            var isLogo = div.closest('[class*="logo"]') || (div.querySelectorAll('a').length === 1);
            if (!isLogo) {
              div.style.setProperty('display', 'none', 'important');
            }
          }
        });
      }

      // 用 MutationObserver 等 React 渲染完
      var obs = new MutationObserver(function() {
        if (document.querySelector('header nav, header > div > nav')) {
          hideHeaderNav();
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });

      // 也在 load 後再跑一次
      window.addEventListener('load', function() {
        setTimeout(hideHeaderNav, 500);
        setTimeout(hideHeaderNav, 1500);
      });

      // hashchange 後也跑
      window.addEventListener('hashchange', function() {
        setTimeout(hideHeaderNav, 300);
      });
    })();
  </script>
